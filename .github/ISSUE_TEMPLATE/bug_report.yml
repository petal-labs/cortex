name: Bug Report
description: Report a bug or unexpected behavior in Cortex
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Perform action '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: |
        Please paste any relevant log output or error messages.
        Run with `--log-level debug` for verbose output.
      render: shell
      placeholder: |
        Paste logs here...

  - type: input
    id: version
    attributes:
      label: Cortex Version
      description: Output of `cortex --version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - Linux
        - macOS
        - Windows
        - Docker
        - WSL
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: OS version (e.g., Ubuntu 22.04, macOS 14.0, Windows 11)
      placeholder: "Ubuntu 22.04"

  - type: dropdown
    id: cpu
    attributes:
      label: CPU Architecture
      description: What CPU architecture are you using?
      options:
        - Intel (x86_64)
        - AMD (x86_64)
        - Apple Silicon (arm64)
        - ARM64 (other)
        - Other
    validations:
      required: true

  - type: dropdown
    id: storage
    attributes:
      label: Storage Backend
      description: Which storage backend are you using?
      options:
        - SQLite (default)
        - PostgreSQL + pgvector
        - Unknown
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: |
        Relevant parts of your `~/.cortex/config.yaml` (remove any sensitive information).
      render: yaml
      placeholder: |
        storage:
          backend: sqlite
        embedding:
          dimensions: 1536

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that might help.
      placeholder: Add any other context here...

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this bug has not already been reported
          required: true
        - label: I am using the latest version of Cortex
          required: false

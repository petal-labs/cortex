version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gosec
    - misspell

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.DB).Close
        - (*database/sql.Conn).Close
        - (*database/sql.Tx).Rollback
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - encoding/json.Unmarshal
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
        - (*go.uber.org/zap.Logger).Sync
        - os.Remove
    govet:
      disable:
        - fieldalignment
        - shadow
        - nilness
        - unusedwrite
    staticcheck:
      checks:
        - "all"
        - "-SA4023"
        - "-SA4031"
        - "-SA9003"
        - "-SA1019"
        - "-ST1000"
        - "-ST1020"
        - "-QF1008"
        - "-QF1011"
        - "-QF1012"
        - "-S1039"
    gosec:
      excludes:
        - G104
        - G201
        - G202
        - G301
        - G304
        - G306
        - G101
        - G404
        - G602
        - G704

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: _test\.go
        linters:
          - gosec
      - path: internal/cmd/
        linters:
          - errcheck
      - path: internal/storage/
        linters:
          - errcheck
      - path: internal/tui/
        linters:
          - errcheck
      - path: internal/entity/
        linters:
          - errcheck

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/petal-labs/cortex

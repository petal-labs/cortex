version: 2

project_name: cortex

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: cortex
    main: ./cmd/cortex
    binary: cortex
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
    - title: Performance
      regexp: '^perf'
      order: 2
    - title: Other
      order: 999

release:
  github:
    owner: petal-labs
    name: cortex
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Cortex {{ .Version }}

    Memory and knowledge service for AI agents.
  footer: |
    **Full Changelog**: https://github.com/petal-labs/cortex/compare/{{ .PreviousTag }}...{{ .Tag }}
